# Fly.io app dedicado pro catálogo Storybook + MCP endpoint.
#
# Auto-stop habilitado: máquina dorme quando ociosa, sobe sob demanda
# (cold start ~3-5s aceitável pro uso do agente).

app = "opensea-storybook"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.storybook"

[http_service]
  internal_port = 6006
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  strategy = "rolling"
