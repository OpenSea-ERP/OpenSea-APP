name: Storybook Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/components/**'
      - '.storybook/**'
      - 'Dockerfile.storybook'
      - 'fly.storybook.toml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: storybook-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Storybook to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.storybook.toml --remote-only --app opensea-storybook
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
