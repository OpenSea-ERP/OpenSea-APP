name: CI

on:
  push:
    branches: ['*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'

concurrency:
  group: ci-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs ESLint, Prettier format check, and TypeScript type checking
  # to catch code quality issues early before attempting a build.
  lint-format-typecheck:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # Performs a full Next.js production build to ensure the app compiles
  # without errors. Caches .next/cache to speed up subsequent builds.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-format-typecheck

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-cache-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: |
            nextjs-cache-${{ hashFiles('package-lock.json') }}-
            nextjs-cache-

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: test -d .next

  # Runs Storybook stories as Vitest tests in a real browser (Playwright).
  # Blocks the PR on accessibility violations (serious/critical) because
  # parameters.a11y.test === 'error' in .storybook/preview.tsx.
  storybook-tests:
    name: Storybook a11y + smoke tests
    runs-on: ubuntu-latest
    needs: lint-format-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Storybook tests (a11y gate)
        run: npm run test:storybook
